services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:8020
      - SERVICE_PRECONDITION=namenode:9870
    volumes:
      - datanode:/hadoop/dfs/data
    depends_on:
      - namenode

  postgres:
    image: postgres:13
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=metastore
    ports:
      - "5432:5432"

  hive-metastore:
    # استخدام نسخة Apache الرسمية لأنها مضمونة التواجد
    image: apache/hive:3.1.3
    container_name: hive-metastore
    restart: always
    command: /opt/hive/bin/hive --service metastore
    environment:
      - DB_DRIVER=postgres
      - HIVE_METASTORE_JDBC_URL=jdbc:postgresql://postgres:5432/metastore
      - HIVE_METASTORE_JDBC_USER=hive
      - HIVE_METASTORE_JDBC_PASSWORD=hive
    depends_on:
      - namenode
      - postgres
    ports:
      - "9083:9083"

  hive-server:
    image: apache/hive:3.1.3
    container_name: hive-server
    restart: always
    command: /opt/hive/bin/hive --service hiveserver2
    environment:
      - HIVE_METASTORE_URIS=thrift://hive-metastore:9083
    depends_on:
      - hive-metastore
    ports:
      - "10000:10000"
      - "10002:10002"

volumes:
  namenode:
  datanode: